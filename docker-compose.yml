services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: debtrac_db
      POSTGRES_USER: debtrac_user
      POSTGRES_PASSWORD: debtrac_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debtrac_user -d debtrac_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://debtrac_user:debtrac_password_123@db:5432/debtrac_db
      DATABASE_SSL: "false"
      PORT: "3001"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-debtrac_jwt_secret_change_in_production}
      SEED_DB: ${SEED_DB:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
